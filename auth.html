<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - AI for Kids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--warm-bg) 0%, var(--warm-bg2) 50%, #FFE0CC 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-lg);
            max-width: 440px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        [data-theme="dark"] .auth-card {
            background: #2a1f18;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-logo .robot-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 8px;
        }

        .auth-logo h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 26px;
            color: var(--text-dark);
        }

        .auth-logo p {
            color: var(--text-med);
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            background: var(--warm-bg);
            border-radius: 14px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-med);
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #FFE0CC;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
            background: white;
            outline: none;
            transition: var(--transition);
        }

        [data-theme="dark"] .form-group input {
            background: #3D2B1F;
            border-color: #4a3828;
            color: var(--text-dark);
        }

        .form-group input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text-light);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 600;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #FFE0CC;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #FFE0CC;
            border-radius: 14px;
            background: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        [data-theme="dark"] .google-btn {
            background: #3D2B1F;
            border-color: #4a3828;
            color: var(--text-dark);
        }

        .google-btn:hover {
            border-color: var(--orange);
            background: var(--peach);
        }

        .auth-error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
        }

        .auth-error.show { display: block; }

        .auth-success {
            background: #DCFCE7;
            color: #166534;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
        }

        .auth-success.show { display: block; }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--orange);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition);
        }

        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="robot-icon"><span class="material-symbols-outlined" style="font-size:56px">smart_toy</span></span>
                <h1>AI for Kids</h1>
                <p>Join the fun and start learning!</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">Login</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerName">Your Name</label>
                    <input type="text" id="registerName" placeholder="What should we call you?" required maxlength="20">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Make it strong! (6+ chars)" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerConfirm">Confirm Password</label>
                    <input type="password" id="registerConfirm" placeholder="Type it again" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="registerBtn">Create Account</button>
            </form>

            <div class="auth-divider">or</div>

            <button class="google-btn" onclick="handleGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="back-link">
                <a href="index.html"><span class="material-symbols-outlined" style="font-size:inherit;vertical-align:middle">arrow_back</span> Back to AI for Kids</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
